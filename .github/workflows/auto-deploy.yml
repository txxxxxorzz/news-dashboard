name: Auto Deploy News Data

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次（UTC 时间）

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Fetch news data
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        python scripts/news_fetcher.py
    
    - name: Aggregate news
      run: |
        python scripts/aggregate_news.py
    
    - name: Copy to root news_data folder
      run: |
        mkdir -p news_data
        cp web/news_data/latest.json news_data/latest.json
    
    - name: Commit and push if changed
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add news_data/ web/news_data/
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Auto update news data [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
        else
          echo "No changes to commit"
        fi
