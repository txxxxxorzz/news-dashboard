name: Auto Deploy News Data

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Fetch news data
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        python scripts/news_fetcher.py
        python scripts/aggregate_news.py
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add web/news_data/latest.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update news data"
        git push
