<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="热点情报">
    <title>🔥 热点情报中心</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #1e40af);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .update-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85rem;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--success);
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .search-box {
            margin-top: 15px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: var(--text);
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .platform-tabs {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .platform-tabs::-webkit-scrollbar {
            display: none;
        }

        .platform-tab {
            padding: 10px 18px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .platform-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .platform-section {
            margin-bottom: 30px;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .platform-icon {
            font-size: 1.5rem;
        }

        .platform-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        @media (min-width: 1200px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            max-height: 500px;
            overflow-y: auto;
        }

        .category-card::-webkit-scrollbar {
            width: 6px;
        }

        .category-card::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .ai-summary {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(147, 51, 234, 0.15));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            margin: 0 15px 15px 15px;
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.6;
        }

        .ai-summary::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, var(--primary), #9333ea);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .category-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .category-count {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .news-list {
            list-style: none;
        }

        .news-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-rank {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-right: 8px;
            background: var(--border);
            color: var(--text-muted);
        }

        .rank-1 { background: #ef4444; color: white; }
        .rank-2 { background: #f97316; color: white; }
        .rank-3 { background: #f59e0b; color: white; }

        .news-title a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        .news-title a:hover {
            color: var(--primary);
        }

        .news-meta {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .news-actions {
            display: flex;
            gap: 8px;
        }

        .news-action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .news-action-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        .news-action-btn.saved {
            color: var(--warning);
            border-color: var(--warning);
        }

        .saved-page {
            display: none;
        }

        .saved-page.active {
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .nav-icon {
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🔥 热点情报中心</h1>
            <p class="subtitle">Real-time Trending News Dashboard</p>
            
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索热点话题...">
                <button class="search-btn" onclick="searchNews()">🔍</button>
            </div>

            <div class="update-info">
                <span id="updateTime">最后更新：--</span>
                <div class="auto-refresh">
                    <span class="refresh-dot"></span>
                    <span>自动刷新 5 分钟</span>
                </div>
            </div>
        </div>
    </header>

    <div class="platform-tabs" id="platformTabs">
        <div class="platform-tab active" data-platform="all">🌐 全部</div>
        <div class="platform-tab" data-platform="zhihu">📚 知乎</div>
        <div class="platform-tab" data-platform="weibo">🔴 微博</div>
        <div class="platform-tab" data-platform="bilibili">📺 B 站</div>
        <div class="platform-tab" data-platform="douyin">🎵 抖音</div>
        <div class="platform-tab" data-platform="xiaohongshu">📕 小红书</div>
        <div class="platform-tab" data-platform="github">💻 GitHub</div>
        <div class="platform-tab" data-platform="newsapi">📰 科技</div>
    </div>

    <div class="container" id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>加载热点数据中...</p>
        </div>
    </div>

    <div class="container saved-page" id="savedPage">
        <h2 style="margin: 20px 0; font-size: 1.5rem;">⭐ 我的收藏</h2>
        <div id="savedList"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="switchPage('main'); return false;">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="#" class="nav-item" onclick="switchPage('saved'); return false;">
            <span class="nav-icon">⭐</span>
            <span>收藏</span>
        </a>
        <a href="#" class="nav-item" onclick="refreshData(); return false;">
            <span class="nav-icon">🔄</span>
            <span>刷新</span>
        </a>
    </nav>

    <script>
        const DATA_URL = 'news_data/latest.json';
        let currentPlatform = 'all';
        let allNewsData = {};
        let savedNews = JSON.parse(localStorage.getItem('savedNews') || '[]');
        let searchQuery = '';

        async function loadNewsData() {
            console.log('📡 正在加载数据...');
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                allNewsData = await response.json();
                console.log('✅ 数据加载成功:', allNewsData.updateTime);
                render();
            } catch (error) {
                console.error('❌ 加载失败:', error);
                document.getElementById('mainContent').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">❌</div><p>加载失败：' + error.message + '</p></div>';
            }
        }

        function render() {
            console.log('🎨 开始渲染页面...');
            
            if (!allNewsData || !allNewsData.updateTime) {
                console.error('❌ 数据格式错误');
                return;
            }

            document.getElementById('updateTime').textContent = 
                '最后更新：' + new Date(allNewsData.updateTime).toLocaleString('zh-CN');

            const content = document.getElementById('mainContent');
            const platforms = allNewsData.platforms || {};

            console.log('📊 平台数量:', Object.keys(platforms).length);

            let html = '';

            for (const [platformKey, platformData] of Object.entries(platforms)) {
                if (currentPlatform !== 'all' && currentPlatform !== platformKey) {
                    continue;
                }

                html += '<div class="platform-section" data-platform="' + platformKey + '">';
                html += '<div class="platform-header">';
                html += '<span class="platform-icon">' + (platformData.icon || '📌') + '</span>';
                html += '<span class="platform-name">' + (platformData.name || platformKey) + '</span>';
                html += '</div>';
                
                // AI 解读
                if (platformData.aiSummary) {
                    html += '<div class="ai-summary">💡 ' + platformData.aiSummary + '</div>';
                }
                
                html += '<div class="categories-grid">';

                for (const [category, newsList] of Object.entries(platformData.categories || {})) {
                    let filteredNews = newsList;
                    if (searchQuery) {
                        filteredNews = newsList.filter(n => 
                            n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            (n.source || '').toLowerCase().includes(searchQuery.toLowerCase())
                        );
                    }

                    if (filteredNews.length === 0) continue;

                    html += '<div class="category-card">';
                    html += '<div class="category-header">';
                    html += '<span class="category-title">' + category + '</span>';
                    html += '<span class="category-count">' + filteredNews.length + '条</span>';
                    html += '</div>';
                    html += '<ul class="news-list">';

                    filteredNews.forEach((news, index) => {
                        const rankClass = index < 3 ? ('rank-' + (index + 1)) : 'rank-other';
                        const isSaved = savedNews.some(s => s.id === news.id);
                        
                        html += '<li class="news-item">';
                        html += '<div>';
                        html += '<span class="news-rank ' + rankClass + '">' + (index + 1) + '</span>';
                        html += '<span class="news-title"><a href="' + (news.url || '#') + '" target="_blank">' + (news.title || '') + '</a></span>';
                        html += '</div>';
                        html += '<div class="news-meta">';
                        html += '<span class="news-source">' + (news.source || '') + '</span>';
                        html += '<span class="news-time">⏰ ' + (news.time || '') + '</span>';
                        html += '</div>';
                        html += '<div class="news-actions">';
                        html += '<button class="news-action-btn ' + (isSaved ? 'saved' : '') + '" ';
                        html += 'onclick="toggleSave(\'' + (news.id || '') + '\', \'' + escapeHtml(news.title || '') + '\', \'' + (news.url || '#') + '\', \'' + (news.source || '') + '\')">';
                        html += isSaved ? '⭐ 已收藏' : '☆ 收藏';
                        html += '</button>';
                        html += '</div>';
                        html += '</li>';
                    });

                    html += '</ul></div>';
                }

                html += '</div></div>';
            }

            content.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无数据</p></div>';
            console.log('✅ 页面渲染完成');
        }

        function searchNews() {
            searchQuery = document.getElementById('searchInput').value.trim();
            render();
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchNews();
            }
        });

        function toggleSave(id, title, url, source) {
            const index = savedNews.findIndex(s => s.id === id);
            if (index >= 0) {
                savedNews.splice(index, 1);
            } else {
                savedNews.push({ id, title, url, source, savedAt: new Date().toISOString() });
            }
            localStorage.setItem('savedNews', JSON.stringify(savedNews));
            render();
            renderSaved();
        }

        function renderSaved() {
            const savedList = document.getElementById('savedList');
            if (savedNews.length === 0) {
                savedList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><p>还没有收藏任何新闻</p></div>';
                return;
            }

            savedList.innerHTML = savedNews.map(news => 
                '<div class="category-card" style="margin-bottom: 15px;">' +
                '<div class="news-title"><a href="' + news.url + '" target="_blank">' + news.title + '</a></div>' +
                '<div class="news-meta"><span class="news-source">' + news.source + '</span>' +
                '<span class="news-time">收藏于 ' + new Date(news.savedAt).toLocaleString('zh-CN') + '</span></div>' +
                '<div class="news-actions"><button class="news-action-btn saved" onclick="toggleSave(\'' + news.id + '\', \'' + escapeHtml(news.title) + '\', \'' + news.url + '\', \'' + news.source + '\')">⭐ 已收藏</button></div>' +
                '</div>'
            ).join('');
        }

        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (page === 'main') {
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('savedPage').classList.remove('active');
                document.getElementById('platformTabs').style.display = 'flex';
            } else if (page === 'saved') {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('savedPage').classList.add('active');
                document.getElementById('platformTabs').style.display = 'none';
                renderSaved();
            }
        }

        function refreshData() {
            document.querySelector('.loading').style.display = 'block';
            loadNewsData();
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        document.getElementById('platformTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.platform-tab');
            if (!tab) return;

            document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentPlatform = tab.dataset.platform;
            render();
        });

        setInterval(loadNewsData, 5 * 60 * 1000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 已注册'))
                .catch(err => console.error('SW 注册失败:', err));
        }

        // 初始化
        console.log('🔥 热点情报中心启动...');
        loadNewsData();
    </script>
</body>
</html>
