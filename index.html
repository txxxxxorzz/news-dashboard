<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="热点情报">
    <title>🔥 热点情报中心</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 头部 */
        header {
            background: linear-gradient(135deg, var(--primary), #1e40af);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .update-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85rem;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--success);
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 搜索框 */
        .search-box {
            margin-top: 15px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: var(--text);
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* 平台标签 */
        .platform-tabs {
            display: flex;
            gap: 8px;
            padding: 15px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .platform-tabs::-webkit-scrollbar {
            display: none;
        }

        .platform-tab {
            padding: 10px 18px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .platform-tab:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .platform-tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* 内容区域 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }

        /* 分类卡片 */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.3s;
        }

        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-count {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* 新闻列表 */
        .news-list {
            list-style: none;
        }

        .news-item {
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-item:hover {
            padding-left: 10px;
            margin-left: -10px;
            padding-right: 10px;
            margin-right: -10px;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 8px;
        }

        .news-item.highlight {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid var(--warning);
        }

        .news-rank {
            display: inline-block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            text-align: center;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-right: 10px;
        }

        .rank-1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #9ca3af, #6b7280); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #b45309, #78350f); color: #fff; }
        .rank-other { background: var(--border); color: var(--text-muted); }

        .news-title {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 8px;
            display: block;
        }

        .news-title a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s;
            word-break: break-word;
        }

        .news-title a:hover {
            color: var(--primary);
        }

        .news-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            align-items: center;
        }

        .news-source {
            color: var(--primary);
            font-weight: 600;
        }

        .news-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .news-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .news-action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .news-action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .news-action-btn.saved {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* 平台区块 */
        .platform-section {
            margin-bottom: 40px;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .platform-icon {
            font-size: 1.8rem;
        }

        .platform-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            padding: 5px 15px;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* 收藏页面 */
        .saved-page {
            display: none;
        }

        .saved-page.active {
            display: block;
        }

        .saved-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .saved-empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .categories-grid {
                grid-template-columns: 1fr;
            }

            .platform-tabs {
                padding: 10px 15px;
            }

            .category-card {
                margin-bottom: 15px;
            }

            body {
                padding-bottom: 70px;
            }
        }

        /* 数据来源标签 */
        .source-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .source-newsapi { background: #3b82f6; }
        .source-weibo { background: #e6162d; }
        .source-twitter { background: #1da1f2; }
        .source-reddit { background: #ff4500; color: #fff; }
        .source-rss { background: #f26522; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="header-content">
            <h1>🔥 热点情报中心</h1>
            <p class="subtitle">Real-time Trending News Dashboard</p>
            
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索新闻、话题、来源...">
                <button class="search-btn" onclick="searchNews()">🔍</button>
            </div>
            
            <div class="update-info">
                <span id="updateTime">最后更新：--</span>
                <div class="auto-refresh">
                    <span class="refresh-dot"></span>
                    <span>自动刷新 5 分钟</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 平台切换 -->
    <div class="platform-tabs" id="platformTabs">
        <div class="platform-tab active" data-platform="all">🌐 全部</div>
        <div class="platform-tab" data-platform="newsapi">📰 NewsAPI</div>
        <div class="platform-tab" data-platform="weibo">🔴 微博</div>
        <div class="platform-tab" data-platform="twitter">🐦 Twitter</div>
        <div class="platform-tab" data-platform="reddit">👽 Reddit</div>
        <div class="platform-tab" data-platform="rss">📡 RSS</div>
    </div>

    <!-- 主内容区 -->
    <div class="container" id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>加载热点数据中...</p>
        </div>
    </div>

    <!-- 收藏页面 -->
    <div class="container saved-page" id="savedPage">
        <h2 style="margin: 20px 0; font-size: 1.5rem;">⭐ 我的收藏</h2>
        <div id="savedList"></div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="switchPage('main'); return false;">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="#" class="nav-item" onclick="switchPage('saved'); return false;">
            <span class="nav-icon">⭐</span>
            <span>收藏</span>
        </a>
        <a href="#" class="nav-item" onclick="refreshData(); return false;">
            <span class="nav-icon">🔄</span>
            <span>刷新</span>
        </a>
    </nav>

    <script>
        // 配置
        const DATA_URL = 'news_data/latest.json';
        let currentPlatform = 'all';
        let allNewsData = {};
        let savedNews = JSON.parse(localStorage.getItem('savedNews') || '[]');
        let searchQuery = '';

        // 加载数据
        async function loadNewsData() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (response.ok) {
                    allNewsData = await response.json();
                    render();
                } else {
                    allNewsData = getSampleData();
                    render();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                allNewsData = getSampleData();
                render();
            }
        }

        // 示例数据
        function getSampleData() {
            return {
                updateTime: new Date().toISOString(),
                platforms: {
                    newsapi: {
                        name: 'NewsAPI',
                        icon: '📰',
                        categories: {
                            '综合': [
                                { title: 'LeBron, NBA social media react to Bam Adebayo's historic 83-point game', source: 'Al Jazeera', time: '2 小时前', url: '#', id: '1' },
                                { title: 'Trump and GOP plot strategy', source: 'Axios', time: '3 小时前', url: '#', id: '2' }
                            ],
                            '科技': [
                                { title: 'Gemini in Chrome gets first international expansion', source: '9to5Google', time: '1 小时前', url: '#', id: '3' }
                            ]
                        }
                    },
                    weibo: {
                        name: '微博热搜',
                        icon: '🔴',
                        categories: {
                            '热搜': [
                                { title: '#科技前沿动态#', source: '微博', time: '10 分钟前', url: '#', id: '4' }
                            ]
                        }
                    }
                }
            };
        }

        // 渲染页面
        function render() {
            document.getElementById('updateTime').textContent = 
                '最后更新：' + new Date(allNewsData.updateTime).toLocaleString('zh-CN');

            const content = document.getElementById('mainContent');
            const platforms = allNewsData.platforms || {};

            let html = '';

            for (const [platformKey, platformData] of Object.entries(platforms)) {
                if (currentPlatform !== 'all' && currentPlatform !== platformKey) {
                    continue;
                }

                html += `
                    <div class="platform-section" data-platform="${platformKey}">
                        <div class="platform-header">
                            <span class="platform-icon">${platformData.icon}</span>
                            <span class="platform-name">${platformData.name}</span>
                        </div>
                        <div class="categories-grid">
                `;

                for (const [category, newsList] of Object.entries(platformData.categories || {})) {
                    // 搜索过滤
                    let filteredNews = newsList;
                    if (searchQuery) {
                        filteredNews = newsList.filter(n => 
                            n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            n.source.toLowerCase().includes(searchQuery.toLowerCase())
                        );
                    }

                    if (filteredNews.length === 0) continue;

                    html += `
                        <div class="category-card">
                            <div class="category-header">
                                <span class="category-title">${category}</span>
                                <span class="category-count">${filteredNews.length}条</span>
                            </div>
                            <ul class="news-list">
                    `;

                    filteredNews.forEach((news, index) => {
                        const rankClass = index < 3 ? `rank-${index + 1}` : 'rank-other';
                        const isSaved = savedNews.some(s => s.id === news.id);
                        
                        html += `
                            <li class="news-item ${searchQuery ? 'highlight' : ''}">
                                <div>
                                    <span class="news-rank ${rankClass}">${index + 1}</span>
                                    <span class="news-title">
                                        <a href="${news.url}" target="_blank">${news.title}</a>
                                    </span>
                                </div>
                                <div class="news-meta">
                                    <span class="news-source">${news.source}</span>
                                    <span class="news-time">⏰ ${news.time}</span>
                                    <span class="source-badge source-${platformKey}">${platformData.name}</span>
                                </div>
                                <div class="news-actions">
                                    <button class="news-action-btn ${isSaved ? 'saved' : ''}" 
                                            onclick="toggleSave('${news.id}', '${escapeHtml(news.title)}', '${news.url}', '${news.source}')">
                                        ${isSaved ? '⭐ 已收藏' : '☆ 收藏'}
                                    </button>
                                </div>
                            </li>
                        `;
                    });

                    html += `
                            </ul>
                        </div>
                    `;
                }

                html += `
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无数据</p></div>';
        }

        // 搜索功能
        function searchNews() {
            searchQuery = document.getElementById('searchInput').value.trim();
            render();
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchNews();
            }
        });

        // 收藏功能
        function toggleSave(id, title, url, source) {
            const index = savedNews.findIndex(s => s.id === id);
            if (index >= 0) {
                savedNews.splice(index, 1);
            } else {
                savedNews.push({ id, title, url, source, savedAt: new Date().toISOString() });
            }
            localStorage.setItem('savedNews', JSON.stringify(savedNews));
            render();
            renderSaved();
        }

        // 渲染收藏列表
        function renderSaved() {
            const savedList = document.getElementById('savedList');
            if (savedNews.length === 0) {
                savedList.innerHTML = `
                    <div class="saved-empty">
                        <div class="saved-empty-icon">⭐</div>
                        <p>还没有收藏任何新闻</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">点击新闻下方的"收藏"按钮添加到这里</p>
                    </div>
                `;
                return;
            }

            savedList.innerHTML = savedNews.map(news => `
                <div class="category-card" style="margin-bottom: 15px;">
                    <div class="news-title">
                        <a href="${news.url}" target="_blank">${news.title}</a>
                    </div>
                    <div class="news-meta">
                        <span class="news-source">${news.source}</span>
                        <span class="news-time">收藏于 ${new Date(news.savedAt).toLocaleString('zh-CN')}</span>
                    </div>
                    <div class="news-actions">
                        <button class="news-action-btn saved" onclick="toggleSave('${news.id}', '${escapeHtml(news.title)}', '${news.url}', '${news.source}')">
                            ⭐ 已收藏
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 切换页面
        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (page === 'main') {
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('savedPage').classList.remove('active');
                document.getElementById('platformTabs').style.display = 'flex';
            } else if (page === 'saved') {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('savedPage').classList.add('active');
                document.getElementById('platformTabs').style.display = 'none';
                renderSaved();
            }
        }

        // 刷新数据
        function refreshData() {
            document.querySelector('.loading').style.display = 'block';
            loadNewsData();
        }

        // HTML 转义
        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        // 平台切换
        document.getElementById('platformTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.platform-tab');
            if (!tab) return;

            document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentPlatform = tab.dataset.platform;
            render();
        });

        // 自动刷新（每 5 分钟）
        setInterval(loadNewsData, 5 * 60 * 1000);

        // PWA Service Worker 注册
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 已注册'))
                .catch(err => console.error('SW 注册失败:', err));
        }

        // 初始化
        loadNewsData();
    </script>
</body>
</html>
