<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热点情报图标</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a;
            margin: 0;
            font-family: sans-serif;
        }
        .icon-container {
            text-align: center;
        }
        .icon {
            width: 512px;
            height: 512px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 128px;
            font-size: 256px;
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
        }
        p {
            color: #94a3b8;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <div class="icon">🔥</div>
        <p>右键保存此图标为 icon-512.png</p>
    </div>
</body>
</html>
